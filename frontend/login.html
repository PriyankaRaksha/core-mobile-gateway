<html>
<head>
<title>Login</title>
</head>
<body>

<h2>Login</h2>

<input id="username" placeholder="username">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Login</button>

<script>
function login(){
fetch("http://localhost:8000/login",{
method:"POST"
})
.then(res=>res.json())
.then(data=>console.log(data))
}
</script>

</body>
</html>
